<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ScriptDrop</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

<div class="auth-bg">
  <div class="auth-orb orb1"></div>
  <div class="auth-orb orb2"></div>
</div>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Script<span class="logo-accent">Drop</span></span>
    </a>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-icon"><i class="fa fa-bolt"></i></div>
      <h2>Bem-vindo de volta</h2>
      <p>Entre na sua conta para postar scripts</p>
    </div>
    <div class="auth-card-body">
      <div class="field-group">
        <label><i class="fa fa-user"></i> Usuário</label>
        <input type="text" id="username" placeholder="Seu usuário" autocomplete="off"/>
      </div>
      <div class="field-group">
        <label><i class="fa fa-lock"></i> Senha</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()"/>
          <button class="eye-btn" onclick="togglePass('password',this)"><i class="fa fa-eye"></i></button>
        </div>
      </div>
      <p id="error" class="error-msg"></p>
      <button class="btn-primary btn-full" onclick="login()"><i class="fa fa-sign-in-alt"></i> Entrar</button>
      <div class="auth-divider"><span>ou</span></div>
      <p class="auth-switch">Não tem conta? <a href="register.html">Criar conta grátis →</a></p>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
